<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HA Blocks — Visual Automations for Home Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/blockly.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/msg/en.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--d:#08090b;--p:#0e1015;--s:#151920;--e:#1c2230;--b:#232a38;--bb:#2e3a50;--t:#e2dfd8;--t2:#8a8e99;--td:#555a66;--a:#e8952f;--ag:#e8952f40;--g:#5ec489;--gd:#5ec48930;--r:#e85d5d;--rd:#e85d5d30;--bl:#5da4e8;--pu:#a07de8;--fd:'Fraunces',serif;--fb:'DM Sans',system-ui,sans-serif;--fm:'DM Mono','Menlo',monospace}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden;background:var(--d);color:var(--t);font-family:var(--fb)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh}
#hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--b);background:var(--p);gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px}.brand-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--a),#d4701f);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px var(--ag)}
.brand-icon svg{width:16px;height:16px}.brand-name{font-family:var(--fd);font-weight:600;font-size:19px;letter-spacing:-0.02em}.brand-name em{color:var(--a);font-style:italic}
.brand-sub{font-family:var(--fm);font-size:9px;color:var(--td);letter-spacing:0.08em;text-transform:uppercase;margin-top:-2px}
.hac{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.inp{background:var(--d);border:1px solid var(--b);border-radius:5px;padding:5px 10px;color:var(--t);font-size:12px;font-family:var(--fm);outline:none;transition:border-color 0.2s}.inp:focus{border-color:var(--a)}.inp:disabled{opacity:0.4}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:5px;font-size:11px;font-family:var(--fm);font-weight:500;border:1px solid var(--b);background:var(--s);color:var(--t);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover:not(:disabled){background:var(--e);border-color:var(--bb)}.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn-a{background:var(--a);color:var(--d);border-color:var(--a);font-weight:600}.btn-a:hover:not(:disabled){background:#f0a340}
.btn-g{background:var(--g);color:var(--d);border-color:var(--g);font-weight:600}.btn-g:hover:not(:disabled){background:#6dd49a}
.btn-r{color:var(--r);border-color:var(--rd);background:transparent}.btn-r:hover:not(:disabled){background:var(--rd)}
.sp{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-family:var(--fm)}
.sp.off{background:#555a6620;color:var(--td);border:1px solid #555a6640}.sp.on{background:var(--gd);color:var(--g);border:1px solid #5ec48950}.sp.err{background:var(--rd);color:var(--r);border:1px solid #e85d5d50}
.sp .dot{width:5px;height:5px;border-radius:50%;background:currentColor}.sp.on .dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 4px transparent}}
.saved-msg{font-family:var(--fm);font-size:10px;color:var(--g);opacity:0;transition:opacity 0.3s}.saved-msg.show{opacity:1}
#main{flex:1;display:flex;min-height:0}
#sp{width:210px;flex-shrink:0;background:var(--p);border-right:1px solid var(--b);display:flex;flex-direction:column}
.sh{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--b)}.sh h3{font-family:var(--fm);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--td)}
.sl{flex:1;overflow-y:auto;padding:6px}
.si{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:5px;cursor:pointer;font-family:var(--fm);font-size:12px;color:var(--t2);transition:all 0.12s;position:relative}
.si:hover{background:var(--s);color:var(--t)}.si.act{background:var(--s);color:var(--t)}.si.act::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--a);border-radius:2px}
.dr{width:6px;height:6px;border-radius:50%;background:var(--g);flex-shrink:0;animation:pulse 2s infinite}.di{width:6px;height:6px;border-radius:50%;background:var(--td);flex-shrink:0;opacity:0.3}
.sd{background:none;border:none;color:var(--td);cursor:pointer;padding:2px;border-radius:3px;display:flex;opacity:0;transition:opacity 0.15s;margin-left:auto}.si:hover .sd{opacity:1}.sd:hover{color:var(--r);background:var(--rd)}
.ss{padding:8px 12px;border-top:1px solid var(--b);font-family:var(--fm);font-size:10px;color:var(--td)}.ss div{display:flex;justify-content:space-between}
#wa{flex:1;display:flex;flex-direction:column;min-width:0}
#stb{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--b);background:var(--p);flex-shrink:0}
#bc{flex:1;position:relative;background:var(--s);min-height:200px}#bd{position:absolute;top:0;left:0;right:0;bottom:0}
.rb{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:var(--gd);color:var(--g);font-family:var(--fm);font-size:10px;font-weight:600}.rb .dot{width:5px;height:5px;border-radius:50%;background:var(--g);animation:pulse 2s infinite}
#bp{height:200px;flex-shrink:0;border-top:1px solid var(--b);display:flex;flex-direction:column;background:var(--p)}
.tb{display:flex;border-bottom:1px solid var(--b);flex-shrink:0}
.tab{padding:7px 14px;font-size:11px;font-family:var(--fm);color:var(--td);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--t2)}.tab.act{color:var(--a);border-bottom-color:var(--a)}.tab .cnt{background:var(--e);padding:1px 5px;border-radius:3px;font-size:9px}
.pane{flex:1;overflow:auto;display:none}.pane.act{display:block}
#cc{padding:12px 16px;font-family:var(--fm);font-size:12px;line-height:1.7;color:var(--t2);white-space:pre-wrap;word-break:break-all;tab-size:2}
#lc{padding:8px 12px;font-family:var(--fm);font-size:11.5px;line-height:1.6}
.le{padding:2px 0;display:flex;gap:8px;animation:lf .3s ease-out}@keyframes lf{from{opacity:0;transform:translateY(-3px)}to{opacity:1}}
.lt{color:var(--td);flex-shrink:0}.ll{font-weight:600;flex-shrink:0;text-transform:uppercase;min-width:40px}
.ll.info{color:var(--g)}.ll.warn{color:var(--a)}.ll.error{color:var(--r)}.ll.debug{color:var(--td)}
.lm{color:var(--t);word-break:break-word}.ls{color:var(--td);flex-shrink:0}
.es{width:100%;background:var(--d);border:none;border-bottom:1px solid var(--b);padding:7px 12px;color:var(--t);font-family:var(--fm);font-size:11.5px;outline:none}.es:focus{border-bottom-color:var(--a)}
.er{display:flex;justify-content:space-between;align-items:center;padding:5px 12px;border-bottom:1px solid #151920;cursor:pointer;transition:background 0.1s;font-family:var(--fm);font-size:11.5px}.er:hover{background:var(--s)}
.ev.on{color:var(--g)}.ev.off{color:var(--td)}.ev.ot{color:var(--a)}
#ft{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:5px 16px;border-top:1px solid var(--b);background:var(--p);font-family:var(--fm);font-size:10px;color:var(--td)}
.blocklyMainBackground{fill:var(--s)!important}.blocklyToolboxDiv{background:var(--p)!important;border-right:1px solid var(--b)!important}
.blocklyFlyoutBackground{fill:var(--p)!important;fill-opacity:0.97!important}.blocklyScrollbarHandle{fill:var(--b)!important}.blocklyTreeRow{height:32px!important;line-height:32px!important}
.modal-bg{position:fixed;inset:0;background:#00000080;z-index:1000;display:flex;align-items:center;justify-content:center}.modal{background:var(--p);border:1px solid var(--b);border-radius:10px;padding:24px;width:420px;max-width:90vw}
.modal h2{font-family:var(--fd);font-size:18px;margin-bottom:16px}.modal label{display:block;font-family:var(--fm);font-size:11px;color:var(--td);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.modal .inp{width:100%;margin-bottom:12px}.modal .br{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
</style>
</head>
<body>
<div id="app">
<div id="hdr">
<div class="brand"><div class="brand-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#08090b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div><div class="brand-name">ha<em>blocks</em></div><div class="brand-sub">visual automations · home assistant</div></div></div>
<div class="hac">
<div id="spill" class="sp off"><div class="dot"></div><span>offline</span></div>
<button id="cbtn" class="btn btn-a" onclick="toggleConn()" style="display:none">connect</button>
<span id="saved-msg" class="saved-msg">✓ saved</span>
<button class="btn" onclick="showSettings()" title="Settings">⚙</button>
</div>
</div>
<div id="main">
<div id="sp"><div class="sh"><h3>Scripts</h3><button class="btn" onclick="newScript()" style="padding:3px 8px;font-size:10px">+ new</button></div><div id="slist" class="sl"></div><div class="ss"><div><span>entities</span><span id="ecnt" style="color:var(--g)">0</span></div><div><span>running</span><span id="rcnt" style="color:var(--a)">0</span></div></div></div>
<div id="wa">
<div id="stb"><span style="color:var(--td);font-size:12px">#</span><input id="sname" class="inp" placeholder="script name" style="background:transparent;border:none;padding:2px 4px;font-weight:600;font-size:13px;width:200px" onchange="renameScript(this.value)"/><div id="rba"></div><div style="flex:1"></div>

<button id="rbtn" class="btn btn-g" onclick="runScript()" disabled>▶ run</button>
<button id="sbtn" class="btn btn-r" onclick="stopScript()" style="display:none">■ stop</button>
<button class="btn btn-r" onclick="deleteScript()" style="padding:5px 7px" title="Delete">✕</button></div>
<div id="bc"><div id="bd"></div></div>
<div id="bp">
<div class="tb"><div class="tab act" data-t="code" onclick="swTab(this)">{} code</div><div class="tab" data-t="log" onclick="swTab(this)">log <span id="lcnt" class="cnt">0</span></div><div class="tab" data-t="ent" onclick="swTab(this)">entities</div><div style="flex:1"></div><button onclick="logs=[];$('lc').innerHTML='';$('lcnt').textContent='0'" style="background:none;border:none;color:var(--td);cursor:pointer;padding:4px 10px;font-family:var(--fm);font-size:10px">clear</button></div>
<div id="p-code" class="pane act"><div id="cc">// Build automations with blocks above</div></div>
<div id="p-log" class="pane"><div id="lc"></div></div>
<div id="p-ent" class="pane"><input class="es" placeholder="search entities..." oninput="rEnts(this.value)"/><div id="elist" style="overflow-y:auto"></div></div>
</div></div></div>
<div id="ft"><div style="display:flex;gap:14px"><span>⚡ <span id="fr">0</span> running</span><span>🕐 <span id="fs">0</span> schedules</span><span>📡 <span id="fu">0</span> subs</span></div><span>auto-saved · blocks persist</span></div>
</div>
<div id="setmod" class="modal-bg" style="display:none" onclick="if(event.target===this)this.style.display='none'"><div class="modal"><h2>Settings</h2><label>Latitude (for astro)</label><input id="slat" class="inp" type="number" step="0.0001" placeholder="51.97"/><label>Longitude (for astro)</label><input id="slng" class="inp" type="number" step="0.0001" placeholder="5.67"/><label>Auto-connect on load</label><select id="sauto" class="inp"><option value="1">Yes</option><option value="0">No</option></select><label>Long-lived access token <small style="opacity:.6;color:#e8952f">★ required — HA Profile → Security</small></label><input id="stok" class="inp" type="password" placeholder="eyJ..."/><div class="br"><button class="btn" onclick="$('setmod').style.display='none'">cancel</button><button class="btn btn-a" onclick="saveSets()">save &amp; connect</button></div></div></div>

<script>
const $=id=>document.getElementById(id);
let ws=null,wsC=false;
let ents=new Map(),scripts=[],cid=null,rts=new Set(),logs=[],logN=0;
let _savedTok='';
let workspace=null,sets={lat:51.97,lng:5.67,auto:true};
const jsGen=javascript.javascriptGenerator,Order=javascript.Order;

// Storage
// Storage: use localStorage (works in add-on and standalone)
const S={async g(k,fb){try{const v=localStorage.getItem('hab_'+k);return v?JSON.parse(v):fb}catch{return fb}},async s(k,v){try{localStorage.setItem('hab_'+k,JSON.stringify(v))}catch{}}};
// Backend WebSocket URL — must include ingress path prefix when served via HA ingress
const BACKEND_WS=(location.protocol==='https:'?'wss://':'ws://')+location.host+location.pathname.replace(/\/$/,'')+'/ws';

// Flash saved indicator
function flashSaved(){const el=$('saved-msg');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000)}

// HA WebSocket
function setSt(s,m){const el=$('spill');el.className='sp '+(s==='on'?'on':s==='err'?'err':'off');el.querySelector('span').textContent=s==='err'?(m||'error').slice(0,30):s==='on'?'connected':'offline';$('rbtn').disabled=s!=='on';const cb=$('cbtn');if(cb){cb.style.display=s==='on'?'none':'';cb.textContent='connect'}}

function handleMsg(ev){
  let m;try{m=JSON.parse(ev.data)}catch{return}
  switch(m.type){
    case 'ha_status':
      if(m.status==='connected'){setSt('on');addLog('sys','info','HA connected — '+ents.size+' entities');rEnts()}
      else{setSt('err','HA disconnected')}
      break;
    case 'states':
      ents.clear();m.data.forEach(s=>ents.set(s.entity_id,s));rEnts();break;
    case 'state_changed':{
      const{entity_id:eid,new_state:ns}=m.data?.data||{};
      if(eid){if(ns)ents.set(eid,ns);else ents.delete(eid);if($('p-ent').classList.contains('act'))rEnts()}break;}
    case 'running':
      rts.clear();m.ids.forEach(id=>rts.add(id));
      $('fr').textContent=rts.size;
      if(m.subs!=null)$('fu').textContent=m.subs;
      if(m.scheds!=null)$('fs').textContent=m.scheds;
      updRun();rScripts();break;
    case 'log':addLog(m.script||'sys',m.level||'info',m.msg,m.t);break;
    case 'error':addLog('sys','error',m.msg||'Unknown error');break;
  }
}

async function toggleConn(){
  if(wsC){ws.close();ws=null;wsC=false;ents.clear();rts.clear();rEnts();setSt('off');addLog('sys','info','Disconnected');updRun();updFt();return}
  const tok=_savedTok;
  if(!tok){setSt('err','enter token in ⚙ settings');return}
  try{
    ws=new WebSocket(BACKEND_WS);
    await new Promise((res,rej)=>{
      const tm=setTimeout(()=>{ws.close();rej(new Error('Timeout'))},15000);
      ws.onopen=()=>ws.send(JSON.stringify({type:'auth',token:tok}));
      ws.onmessage=ev=>{let m;try{m=JSON.parse(ev.data)}catch{return}
        if(m.type==='auth_ok'){clearTimeout(tm);wsC=true;ws.onmessage=handleMsg;res()}
        else if(m.type==='auth_error'){clearTimeout(tm);rej(new Error(m.message||'Auth failed'))}
        else if(m.type==='error'){clearTimeout(tm);rej(new Error(m.msg||'Error'))}
        else handleMsg(ev)};
      ws.onerror=()=>{clearTimeout(tm);rej(new Error('Backend unreachable'))};
      ws.onclose=()=>{if(wsC){wsC=false;setSt('off')}}});
    setSt('on');addLog('sys','info','Connected to backend');
  }catch(e){setSt('err',e.message);addLog('sys','error','Failed: '+e.message);ws=null;wsC=false}
}

function showSettings(){$('slat').value=sets.lat;$('slng').value=sets.lng;$('sauto').value=sets.auto?'1':'0';$('stok').value=_savedTok||'';$('setmod').style.display=''}
function saveSets(){sets.lat=parseFloat($('slat').value)||51.97;sets.lng=parseFloat($('slng').value)||5.67;sets.auto=$('sauto').value==='1';const t=$('stok').value.trim();if(t){_savedTok=t;S.s('ha-token',t)}S.s('ha-sets',sets);$('setmod').style.display='none';addLog('sys','info','Settings saved');flashSaved();if(!wsC&&(ADDON_MODE||_savedTok))toggleConn()}

// Logging
function addLog(sc,lv,msg,ts){const e={id:++logN,t:ts||Date.now(),sc,lv,msg:String(msg)};logs.push(e);if(logs.length>500)logs=logs.slice(-400);$('lcnt').textContent=logs.length;if($('p-log').classList.contains('act'))appLog(e)}
function appLog(l){const el=$('lc'),dt=new Date(l.t),pad=n=>String(n).padStart(2,'0'),t=pad(dt.getHours())+':'+pad(dt.getMinutes())+':'+pad(dt.getSeconds()),d=document.createElement('div');d.className='le';d.innerHTML='<span class="lt">'+t+'</span><span class="ll '+l.lv+'">'+l.lv+'</span><span class="ls">['+esc(l.sc)+']</span><span class="lm">'+esc(l.msg)+'</span>';el.appendChild(d);el.scrollTop=el.scrollHeight}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// Entities
function rEnts(q){$('ecnt').textContent=ents.size;q=(q||'').toLowerCase();const el=$('elist');if(!el)return;
const arr=Array.from(ents.values()).filter(e=>!q||e.entity_id.includes(q)||(e.attributes?.friendly_name||'').toLowerCase().includes(q)).sort((a,b)=>a.entity_id.localeCompare(b.entity_id)).slice(0,200);
el.innerHTML=arr.map(e=>{const c=e.state==='on'||e.state==='home'?'on':e.state==='off'||e.state==='unavailable'?'off':'ot';return'<div class="er" onclick="navigator.clipboard?.writeText(\''+e.entity_id+'\')"><span>'+e.entity_id+'</span><span class="ev '+c+'">'+esc(e.state).slice(0,20)+'</span></div>'}).join('')}

// Tabs
function swTab(el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));el.classList.add('act');document.querySelectorAll('.pane').forEach(p=>p.classList.remove('act'));$('p-'+el.dataset.t).classList.add('act');if(el.dataset.t==='log'){$('lc').innerHTML='';logs.forEach(l=>appLog(l))}if(el.dataset.t==='ent')rEnts()}

// Scripts
function newScript(){const id='s_'+Date.now();scripts.push({id,name:'script_'+(scripts.length+1),st:null});selScript(id);saveAll()}
function selScript(id){if(cid&&workspace){const c=scripts.find(s=>s.id===cid);if(c)c.st=Blockly.serialization.workspaces.save(workspace)}cid=id;const sc=scripts.find(s=>s.id===id);if(!sc)return;$('sname').value=sc.name;if(workspace){workspace.clear();if(sc.st)try{Blockly.serialization.workspaces.load(sc.st,workspace)}catch(e){console.warn(e)}}updRun();rScripts();updCode()}
function renameScript(n){const sc=scripts.find(s=>s.id===cid);if(sc){sc.name=n;saveAll();rScripts()}}
function saveScript(){if(!cid||!workspace)return;const sc=scripts.find(s=>s.id===cid);if(sc)sc.st=Blockly.serialization.workspaces.save(workspace);saveAll();flashSaved()}
function deleteScript(){if(!cid)return;const sc=scripts.find(s=>s.id===cid);if(!confirm('Delete "'+sc?.name+'"?'))return;if(rts.has(cid)&&wsC)ws.send(JSON.stringify({type:'stop',id:cid}));scripts=scripts.filter(s=>s.id!==cid);if(scripts.length)selScript(scripts[0].id);else{cid=null;workspace?.clear();$('sname').value=''}saveAll();rScripts();updFt()}
function saveAll(){S.s('hb-scripts',scripts)}
function rScripts(){$('slist').innerHTML=scripts.map(s=>'<div class="si '+(s.id===cid?'act':'')+'" onclick="selScript(\''+s.id+'\')"><div class="'+(rts.has(s.id)?'dr':'di')+'"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(s.name)+'</span><button class="sd" onclick="event.stopPropagation();delId(\''+s.id+'\')">✕</button></div>').join('');$('rcnt').textContent=rts.size}
function delId(id){const sc=scripts.find(s=>s.id===id);if(!confirm('Delete "'+sc?.name+'"?'))return;if(rts.has(id)&&wsC)ws.send(JSON.stringify({type:'stop',id}));scripts=scripts.filter(s=>s.id!==id);if(id===cid){if(scripts.length)selScript(scripts[0].id);else{cid=null;workspace?.clear();$('sname').value=''}}saveAll();rScripts();updFt()}
function updRun(){const r=rts.has(cid);$('rbtn').style.display=r?'none':'';$('sbtn').style.display=r?'':'none';$('rba').innerHTML=r?'<div class="rb"><div class="dot"></div>running</div>':''}
function updFt(){$('fr').textContent=rts.size}
function updCode(){if(!workspace)return;try{$('cc').textContent=jsGen.workspaceToCode(workspace)||'// Build automations with blocks above'}catch(e){$('cc').textContent='// Error: '+e.message}}

// ============= RUNTIME (runs in Node.js backend) =============
function runScript(){if(!cid||!workspace||!wsC)return;saveScript();const sc=scripts.find(s=>s.id===cid);if(!sc)return;
const code=jsGen.workspaceToCode(workspace);
ws.send(JSON.stringify({type:'run',id:cid,name:sc.name,code,opts:{lat:sets.lat,lng:sets.lng}}))}
function stopScript(){if(!cid||!wsC)return;ws.send(JSON.stringify({type:'stop',id:cid}))}

// ============= BLOCKLY BLOCKS =============
function defBlocks(){

Blockly.Blocks['ha_on_change']={init:function(){this.appendDummyInput().appendField('🔔 when').appendField(new Blockly.FieldTextInput('entity_id'),'E').appendField('changes');this.appendStatementInput('DO').appendField('do');this.setColour('#e8952f');this.setPreviousStatement(true);this.setNextStatement(true);this.setTooltip('Wildcards: light.*, sensor.temp*')}};
G.forBlock['ha_on_change']=function(b,g){return"on('"+b.getFieldValue('E')+"', function(event) {\n"+g.statementToCode(b,'DO')+"});\n"};

Blockly.Blocks['ha_on_value']={init:function(){this.appendDummyInput().appendField('🔔 when').appendField(new Blockly.FieldTextInput('entity_id'),'E').appendField('becomes').appendField(new Blockly.FieldTextInput('on'),'V');this.appendStatementInput('DO').appendField('do');this.setColour('#e8952f');this.setPreviousStatement(true);this.setNextStatement(true)}};
G.forBlock['ha_on_value']=function(b,g){return"on('"+b.getFieldValue('E')+"', function(event) {\n  if (String(event.state) === '"+b.getFieldValue('V')+"') {\n"+g.statementToCode(b,'DO')+"  }\n});\n"};

Blockly.Blocks['ha_on_multi']={init:function(){this.appendDummyInput().appendField('🔔 when any of').appendField(new Blockly.FieldTextInput('entity1, entity2'),'E').appendField('changes');this.appendStatementInput('DO').appendField('do');this.setColour('#e8952f');this.setPreviousStatement(true);this.setNextStatement(true);this.setTooltip('Comma-separated entity IDs')}};

Blockly.Blocks['ha_event']={init:function(){this.appendDummyInput().appendField('📨 trigger').appendField(new Blockly.FieldDropdown([['new state','state'],['old state','oldState'],['entity id','entityId'],['new value (num)','Number(event.state)'],['attributes','JSON.stringify(event.attributes)']]),'P');this.setOutput(true);this.setColour('#e8952f')}};
G.forBlock['ha_event']=function(b){const p=b.getFieldValue('P');return[p.startsWith('event.')||p.startsWith('Number')||p.startsWith('JSON')?p:'event.'+p,O.MEMBER]};

Blockly.Blocks['ha_cron']={init:function(){this.appendDummyInput().appendField('⏰ cron').appendField(new Blockly.FieldTextInput('0 * * * *'),'C');this.appendStatementInput('DO').appendField('do');this.setColour('#e8952f');this.setPreviousStatement(true);this.setNextStatement(true);this.setTooltip('min hour day month weekday')}};
G.forBlock['ha_cron']=function(b,g){return"schedule('"+b.getFieldValue('C')+"', function() {\n"+g.statementToCode(b,'DO')+"});\n"};

Blockly.Blocks['ha_every']={init:function(){this.appendDummyInput().appendField('🔁 every').appendField(new Blockly.FieldNumber(60,1),'S').appendField('seconds');this.appendStatementInput('DO').appendField('do');this.setColour('#e8952f');this.setPreviousStatement(true);this.setNextStatement(true)}};
G.forBlock['ha_every']=function(b,g){return"setInterval(function() {\n"+g.statementToCode(b,'DO')+"}, "+(b.getFieldValue('S')*1000)+");\n"};

Blockly.Blocks['ha_astro_trigger']={init:function(){this.appendDummyInput().appendField('🌅 at').appendField(new Blockly.FieldDropdown([['sunrise','sunrise'],['sunset','sunset'],['dawn','dawn'],['dusk','dusk'],['noon','noon']]),'EV').appendField('shift').appendField(new Blockly.FieldNumber(0),'SH').appendField('min');this.appendStatementInput('DO').appendField('do');this.setColour('#e8952f');this.setPreviousStatement(true);this.setNextStatement(true);this.setTooltip('Trigger at astro event. Shift in minutes (can be negative)')}};
G.forBlock['ha_astro_trigger']=function(b,g){const ev=b.getFieldValue('EV'),sh=b.getFieldValue('SH');return"(function() {\n  var aDate = getAstroDate('"+ev+"');\n  if (aDate) {\n    var ms = aDate.getTime() - Date.now() + ("+(sh*60000)+");\n    if (ms > 0) setTimeout(function() {\n"+g.statementToCode(b,'DO')+"    }, ms);\n  }\n})();\n"};

Blockly.Blocks['ha_time_compare']={init:function(){this.appendDummyInput().appendField('🕐 current time').appendField(new Blockly.FieldDropdown([['>=','>='],['<=','<='],['==','==='],['between','between']]),'OP').appendField(new Blockly.FieldTextInput('08:00'),'T1');this.appendDummyInput().appendField('and').appendField(new Blockly.FieldTextInput('22:00'),'T2');this.setOutput(true,'Boolean');this.setColour('#5b80a5');this.setTooltip('Compare current time. Use HH:MM format')}};
G.forBlock['ha_time_compare']=function(b){const op=b.getFieldValue('OP'),t1=b.getFieldValue('T1'),t2=b.getFieldValue('T2');
if(op==='between')return["(function(){var n=new Date(),c=n.getHours()*60+n.getMinutes(),a='"+t1+"'.split(':'),b='"+t2+"'.split(':');var s=+a[0]*60+(+a[1]),e=+b[0]*60+(+b[1]);return s<=e?c>=s&&c<=e:c>=s||c<=e})()",O.FUNCTION_CALL];
return["(function(){var n=new Date(),c=n.getHours()*60+n.getMinutes(),p='"+t1+"'.split(':');return c"+op+"(+p[0]*60+(+p[1]))})()",O.FUNCTION_CALL]};

G.forBlock['text_print']=function(b,g){return'log.info('+(g.valueToCode(b,'TEXT',O.NONE)||"''")+');\n'};
}

async function init(){
  const st=await S.g('ha-token',''),ss=await S.g('hb-scripts',null),se=await S.g('ha-sets',null);
  if(st)_savedTok=st;
  if(se)sets=se;
  defBlocks();
  workspace=Blockly.inject('bd',{toolbox,theme:Blockly.Theme.defineTheme('hab',{base:Blockly.Themes.Classic,componentStyles:{workspaceBackgroundColour:'#151920',toolboxBackgroundColour:'#0e1015',toolboxForegroundColour:'#e2dfd8',flyoutBackgroundColour:'#1c2230',flyoutForegroundColour:'#e2dfd8',flyoutOpacity:0.97,scrollbarColour:'#232a38',scrollbarOpacity:0.8,insertionMarkerColour:'#e8952f',cursorColour:'#e8952f'},fontStyle:{family:'DM Mono, monospace',weight:'500',size:11},startHats:true}),

}
